name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    # macOS is non-blocking: PyMuPDF (the AGPL PDF backend) segfaults at
    # `import pymupdf` on the macos-latest arm64 runner — a native MuPDF crash
    # upstream of this project, not a code defect (Ruff + Pyright pass on macOS;
    # only the pytest import crashes). Kept in the matrix for visibility so the
    # leg goes green once a PyMuPDF release fixes the arm64 import. Remove this
    # line to re-block on macOS.
    continue-on-error: ${{ matrix.os == 'macos-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Download spaCy model
        run: uv run --extra dev python -m spacy download en_core_web_lg

      - name: Ruff lint
        run: uv run --extra dev ruff check .

      - name: Pyright type-check
        run: uv run --extra dev pyright

      - name: Pytest (coverage)
        env:
          HYPOTHESIS_PROFILE: ci
          PYTHONHASHSEED: "0"
          TZ: UTC
        run: uv run --extra dev pytest --cov=book_indexer --cov-report=xml -q

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
