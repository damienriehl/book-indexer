  # ===== INLINE_RULE =====
  # Empirical token splits verified 2026-04-26 against spaCy 3.8.14
  # tokenizer (RESEARCH §"Recommended regex pattern set" lines 421-461):
  #   "FRE 403"           → ['FRE', '403']                  — 2 tokens
  #   "FRCP 26(b)(1)"     → ['FRCP', '26(b)(1', ')']         — 3 tokens (subsection irrecoverable)
  #   "FRCP 26"           → ['FRCP', '26']                  — 2 tokens
  #   "FRAP 4"            → ['FRAP', '4']                   — 2 tokens
  #   "Fed. R. Evid. 803" → ['Fed', '.', 'R.', 'Evid', '.', '803']  — 6 tokens
  #   "Fed. R. Civ. P. 26"→ ['Fed', '.', 'R.', 'Civ', '.', 'P.', '26']  — 7 tokens
  #   "42 U.S.C. § 1983"  → ['42', 'U.S.C.', '§', '1983']    — 4 tokens
  #
  # Note: vocab_fre / vocab_fre_403 / vocab_fre_801 above are SEED_VOCAB
  # entries that happen to be rule-shaped; the patterns below are the
  # GENERIC INLINE_RULE matchers covering arbitrary rule numbers.
  - id: "fre_rule"
    label: "FRE_RULE"
    pattern:
      - {TEXT: "FRE"}
      - {TEXT: {REGEX: "^\\d+$"}}
  - id: "frcp_rule"
    label: "FRCP_RULE"
    pattern:
      - {TEXT: "FRCP"}
      - {TEXT: {REGEX: "^\\d+(\\([\\w]+)?$"}}
  - id: "frap_rule"
    label: "FRAP_RULE"
    pattern:
      - {TEXT: "FRAP"}
      - {TEXT: {REGEX: "^\\d+$"}}
  - id: "fed_r_evid_rule"
    label: "FED_R_RULE"
    pattern:
      - {TEXT: "Fed"}
      - {TEXT: "."}
      - {TEXT: "R."}
      - {TEXT: "Evid"}
      - {TEXT: "."}
      - {TEXT: {REGEX: "^\\d+$"}}
  - id: "fed_r_civ_p_rule"
    label: "FED_R_RULE"
    pattern:
      - {TEXT: "Fed"}
      - {TEXT: "."}
      - {TEXT: "R."}
      - {TEXT: "Civ"}
      - {TEXT: "."}
      - {TEXT: {REGEX: "^P\\.?$"}}
      - {TEXT: {REGEX: "^\\d+$"}}
  - id: "fed_r_app_p_rule"
    label: "FED_R_RULE"
    pattern:
      - {TEXT: "Fed"}
      - {TEXT: "."}
      - {TEXT: "R."}
      - {TEXT: "App"}
      - {TEXT: "."}
      - {TEXT: {REGEX: "^P\\.?$"}}
      - {TEXT: {REGEX: "^\\d+$"}}
  - id: "fed_r_crim_p_rule"
    label: "FED_R_RULE"
    pattern:
      - {TEXT: "Fed"}
      - {TEXT: "."}
      - {TEXT: "R."}
      - {TEXT: "Crim"}
      - {TEXT: "."}
      - {TEXT: {REGEX: "^P\\.?$"}}
      - {TEXT: {REGEX: "^\\d+$"}}
  - id: "usc_ref"
    label: "USC_REF"
    pattern:
      - {TEXT: {REGEX: "^\\d+$"}}
      - {TEXT: "U.S.C."}
      - {TEXT: "§"}
      - {TEXT: {REGEX: "^\\d+$"}}

