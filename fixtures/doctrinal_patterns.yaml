# fixtures/doctrinal_patterns.yaml
# spaCy EntityRuler patterns for the Phase 3a v2 `doctrinal` pass (D-24 / D-30).
#
# IMMUTABILITY (D-30): never edit this file in place after first commit. To
# revise, create `fixtures/doctrinal_patterns_v2.yaml` and bump the
# `entity_ruler_pattern_sha` field in the symbolic-pass provenance sidecar
# (Plan 03A-v2-02), busting the implicit doctrinal cache.
#
# Provenance (CON-05): every pattern derives from EXACTLY ONE of four sources,
# all corpus-derived or rule-citation regex. External legal taxonomies
# (Westlaw key numbers, MeSH legal subset, Black's Law Dictionary, …) are
# explicitly NOT a source — see PROJECT.md "Out of Scope".
#
#   - SEED_LEMMA  : config/legal_lemma_overrides.yaml (Phase 1 D-18 — 14 entries)
#   - SEED_VOCAB  : fixtures/legal_phrase_vocab.yaml  (Phase 2 D-06 — 42 entries)
#   - INLINE_RULE : rule-citation regex/token patterns for FRE / FRCP / FRAP /
#                   Fed. R. * / U.S.C.  (empirical token splits — see RESEARCH
#                   §"Doctrinal Pattern Set Composition" lines 415-461 and H-2)
#   - BOOK_NP     : corpus-derived noun phrases promoted via
#                   scripts/inspect_top_noun_phrases.py output
#
# Pattern construction rules (RESEARCH §"Pattern syntax: three classes"):
#   - Always use TOKEN patterns with `LOWER` (NEVER bare phrase strings — H-1
#     PhraseMatcher default is case-sensitive ORTH, would miss "Hearsay" at
#     sentence start).
#   - Never include `the` / `a` / `an` LOWER tokens in patterns (H-6 — would
#     displace NER on "the Court" → ORG).
#   - Pattern `id` slug = `term.lower().replace(" ", "_").replace("-", "_")`,
#     prefixed by source (`latin_…` / `vocab_…` / `…_rule` / `book_…`) so
#     test_every_pattern_has_unique_id catches collisions.
#   - For FRE / FRCP / FRAP / Fed. R. * / U.S.C. patterns, mirror the
#     empirical token split documented in RESEARCH lines 415-419 — tokenizer
#     drift across spaCy versions is caught by test_every_pattern_compiles.

