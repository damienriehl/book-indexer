# Per-acronym → spelled-out force-merge map for D-01 dedup.
#
# Phase 4's dedup.py reads this YAML once and force-merges the lemma bucket
# of the acronym with the lemma bucket of the spelled-out form. Result:
# "FRE" + "Federal Rules of Evidence" collapse to a single canonical
# bucket; D-01 selects the spelled-out (longest) as canonical, the acronym
# becomes a variant.
#
# Hand-curated by the author (D-01). Adding/changing a row is a
# CONTEXT amendment — planner/executor cannot silently edit.
#
# Empirical body-text counts (from artifacts/page_corpus.sqlite, block_type=body)
# are surfaced in the per-row `body_count` field as grounded evidence so the
# author can decide which acronyms are "real" the source book concepts vs. one-offs.
#
# This fixture is DISTINCT from fixtures/acronym_seed.yaml:
#   - acronym_seed.yaml is consumed by Phase 2 verify() acronym-mode matching
#     (VER-02) — surface-form ↔ canonical pairs.
#   - acronym_overrides.yaml is consumed by Phase 4 dedup.py for force-merge
#     of acronym buckets ↔ spelled-out buckets at canonicalization time.
#   Different consumers, different lifecycles. Overlap is harmless.

metadata:
  curated_by: book-indexer maintainers
  confirmed_at: 2026-04-27T11:06:02Z
  drafted_by: gsd-phase-executor (Phase 4 plan 04-00, 2026-04-26)
  pdf_sha256: 94503c16dcc3ce29d64be1591fec85eb94b83c4452622cfd9676bb604e553070
  pdf_path: samples/synthetic_treatise.pdf
  drafted_method: |
    Initial mapping from RESEARCH §H-2 (acronym detection findings) +
    Open Question 2 + Phase 3a v2 noun_phrase candidates. Body-text
    counts grounded against page_corpus.sqlite tokens (block_type=body)
    on 2026-04-26. Acronyms with 0 body-text hits are RECOMMENDED but
    REMOVABLE during sign-off — they may be carried for forward
    coverage of companion volumes (Pretrial Litigation, Trial Advocacy).
  notes: |
    Acronyms with high body-text counts are confirmed the source book concepts:
    FRE (221), AI (90), ALJ (37), LLM (36), FRCP (25), ESI (10).
    Acronyms with 0 body-text hits are forward-coverage placeholders for
    the companion volumes; the author may strike any during sign-off.
  confirmation_notes: |
    Author sign-off 2026-04-27 by book-indexer maintainers.

    DECISION: Removed the `PI → preliminary injunction` row (1 row struck
    from the 21-row draft, leaving 20 CONFIRMED rows).

    Rationale: `PI` is highly ambiguous in legal prose — it commonly
    expands to "private investigator" as well as "preliminary injunction",
    and would also collide with statistical/scientific senses (e.g.
    "principal investigator"). With 0 body-text hits in
    page_corpus.sqlite (block_type=body), there is no the source book evidence
    to disambiguate, so force-merging `PI` to `preliminary injunction`
    in D-01 dedup would risk silently miscanonicalizing a different
    sense in any companion volume that introduces it. Strike now;
    re-add in a CONTEXT amendment if a future volume justifies it.

    All other 20 rows ratified as drafted. Per-row schema is
    {acronym, spelled_out, body_count, rationale} — no per-row
    `status` field; metadata.curated_by + this confirmation_notes
    block constitute the sign-off for the entire row set, mirroring
    Phase 3b's chapter_rule_systems.yaml convention.

