      (competency), FRE 701/702 (lay/expert opinion), FRE 803/804
      (hearsay), FRE 901 (authentication).

  - chapter: 4
    title: "Evidence, Objections, and Exhibits"
    rule_system: FRE
    status: CONFIRMED
    rationale: |
      Primary evidence chapter — bare "Rule N" defaults to FRE. Corpus
      scan dominated by FRE: 41× FRE 803, 17× FRE 611, 10× FRE 403,
      9× FRE 401, 6× FRE 801/804(b), 4× FRE 901, plus FRE 104, 406,
      410, 501, 601, 1001, 807. No competing rule system observed.

  - chapter: 5
    title: "Jury Trials"
    rule_system: FRCP
    status: CONFIRMED
    rationale: |
      Jury procedure — bare "Rule N" defaults to FRCP (FRCP 38 right to
      jury, FRCP 39 mode, FRCP 47 voir dire, FRCP 48 jury number, FRCP
      51 instructions). Corpus scan: 2× FRCP 47, 1× FRCP 51, 1× FRE
